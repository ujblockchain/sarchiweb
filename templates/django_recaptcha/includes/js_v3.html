<script nonce="{{ request.csp_nonce }}" src="https://www.google.com/recaptcha/api.js?render={{ public_key }}"></script>

<script nonce="{{ request.csp_nonce }}">
    var element
    grecaptcha.ready(function() {
        element = document.querySelector('.g-recaptcha[data-widget-uuid="{{ widget_uuid }}"]');
        element.form.addEventListener('submit', recaptchaFormSubmit);
    });
    function recaptchaFormSubmit(event) {
        event.preventDefault();
        {% if api_params %}
        grecaptcha.execute('{{ public_key }}', {{ api_params|safe }})
        {% else %}
        grecaptcha.execute('{{ public_key }}', {action: 'form'})
        {% endif %}
        .then(function(token) {
            console.log("reCAPTCHA validated for 'data-widget-uuid=\"{{ widget_uuid }}\"'. Setting input value...")
            element.value = token;
            element.form.submit();
        });
    }
</script>
